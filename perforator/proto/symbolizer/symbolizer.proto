syntax="proto3";

package NPerforator.NProto.NSymbolizer;

option go_package = "github.com/yandex/perforator/perforator/proto/symbolizer";

service Symbolizer {
    rpc Symbolize(SymbolizeRequest) returns (SymbolizeResponse) {}
};

message Line {
    string FunctionName = 1;
    string DemangledFunctionName = 2;
    string Filename = 3;
    uint64 StartLine = 4;
    uint64 Line = 5;
    uint64 Column = 6;
    uint64 Discriminator = 7;
};

message LocationSymbolizationResult {
    oneof AddressType {
        uint64 ELFOffset = 1;
        uint64 ELFVaddr = 2;
    }
    repeated Line Lines = 3;
    string Error = 4;
};

message PerBinaryResponse {
    string BuildID = 1;
    repeated LocationSymbolizationResult Locations = 2;
    // error that obstructs symbolization process
    // (e. g. binary download failure)
    string Error = 3;
};

message PerBinaryRequest {
    string BuildID = 1;
    repeated uint64 Addresses = 2;
    repeated uint64 Offsets = 3;
};

message SymbolizeRequest {
    repeated PerBinaryRequest Batch = 1;
};

message SymbolizeResponse {
    repeated PerBinaryResponse Batch = 1;
};
