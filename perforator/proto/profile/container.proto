syntax = "proto3";

package NPerforator.NProto.NProfile;

option go_package = "github.com/yandex/perforator/perforator/proto/profile";

message ProfileContainer {
    enum CompressionMethod {
        Unknown = 0;
        None = 1;
        Zstd = 2;
        Gzip = 3;
    }

    message Payload {
        CompressionMethod compression_method = 1;
        bytes data = 2;
    }

    Payload pprof = 1;
    Payload yaprof = 2;
}
